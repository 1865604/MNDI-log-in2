<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONDAI LIMITED 職員認証システム</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:sans-serif;
}

.card{
    background:white;
    width:340px;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    text-align:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#0f172a;
    margin-bottom:8px;
}

.sub{
    color:#64748b;
    margin-bottom:20px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:12px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#msg{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">
    <div class="logo">MONDAI LIMITED</div>
    <div class="sub">職員専用ページ</div>

    <input
        type="password"
        id="password"
        placeholder="パスワードを入力">

    <button onclick="login()">ログイン</button>

    <div id="msg"></div>
</div>

<script>
function login(){

    const correctPassword = "0065";
    const input = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if(input === correctPassword){

        msg.style.color = "green";
        msg.textContent = "認証成功。ページへ移動します...";

        setTimeout(() => {
            window.location.href =
            "https://sites.google.com/view/monndai-com/186504";
        }, 1000);

    }else{

        msg.style.color = "red";
        msg.textContent = "パスワードが違います。";

    }
}

document.getElementById("password")
.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        login();
    }
});
</script>

</body>
</html>
